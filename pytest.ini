[pytest]
testpaths = tests

python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts = -ra --strict-markers
          --cov=.
          --cov-report=term-missing
          --cov-report=html

markers =
    slow: marks tests as slow
    integration: integration-level tests
    unit: unit-level tests


